name: Validate archive

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Check Python syntax
        run: python -m py_compile scripts/*.py

      - name: Regenerate exercise index
        run: python scripts/genera_indice.py

      - name: Ensure generated index is committed
        run: git diff --exit-code metadata/indice_esercizi.csv

      - name: Validate exercise archive
        run: python scripts/valida_archivio.py

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-lang-italian \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended

      - name: Compile generated LaTeX files
        run: python scripts/compila_verifiche.py
